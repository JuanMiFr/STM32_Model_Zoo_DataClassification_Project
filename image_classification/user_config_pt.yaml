general:
  display_figures: false

model:
  framework: 'torch' # Must have
  model_name: 'mobilenet_a025_pt' 
  model_path: C:\Users\juanm\Documents\Documents\Canada\SessionHiver2026\Sys800\projet\modelesonnx\mobilenet_a025_70p\mobilenet_a025_pt_int8.onnx #./pt/src/experiments_outputs/2026_04_05_15_06_57_70p/saved_models/mobilenet_a025_pt/mobilenet_a025_pt.onnx
  pretrained: true
  pretrained_dataset: "imagenet"
  input_shape: [3, 224, 224]

operation_mode: benchmarking #chain_eqe #chain_tqe

dataset:
  dataset_name: cifar100
  class_names: ./datasets/labels_cifar100.txt
  #classes_file_path: ./datasets/labels_cifar100.txt
  training_path: ./datasets/cifar100/train       # dossier contenant les images d'entraînement
  test_path: ./datasets/cifar100/test      # dossier contenant les images de validation
  num_classes: 100 # change according to your dataset
  data_dir: ./datasets/cifar100
  train_split: "train"
  val_split: "validation"
  quantization_path: ./datasets/cifar100
  quantization_split: 0.4
  # test_path: you can provide path to test data and it will be used for validation
  
  workers: 4
  no_prefetcher: true

quantization:
   quantizer: Onnx_quantizer
   quantization_type: PTQ
   quantization_input_type: uint8
   quantization_output_type: float
   export_dir: quantized_models
   onnx_quant_parameters: # Optional, only applies to Onnx_quantizer
   onnx_extra_options:  # Optional, only applies to Onnx_quantizer
   iterative_quant_parameters: # Optional, only applies to Onnx_quantizer




